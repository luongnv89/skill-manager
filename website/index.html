/* ─── Reset ─────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; overflow-x: hidden; }

/* ─── Theme (Dark — default) ────────────────────────────────────────────── */
:root {
  --brand: #00ff41;
  --brand-dim: #00cc33;
  --brand-glow: rgba(0, 255, 65, 0.12);
  --bg: #0a0a0f;
  --bg-card: #12131a;
  --bg-card-hover: #181924;
  --bg-surface: #16171f;
  --bg-input: #0e0f14;
  --text: #e0e0e8;
  --text-dim: #8888a0;
  --text-muted: #555568;
  --border: #1e1f2e;
  --border-focus: rgba(0, 255, 65, 0.35);
  --yellow: #e0af68;
  --header-bg: rgba(10, 10, 15, 0.92);
  --modal-overlay: rgba(0, 0, 0, 0.75);
  --logo-center-fill: #0a0a0a;
  --verified: #60a5fa;
  --verified-bg: rgba(96, 165, 250, 0.1);
  --tag-fixed: #7aa2f7;
  --tag-fixed-bg: rgba(122, 162, 247, 0.08);
  --badge-cat-bg: rgba(0, 255, 65, 0.06);
  --tag-added-bg: rgba(0, 255, 65, 0.08);
  --warn-bg: rgba(224, 175, 104, 0.1);
  --tag-changed-bg: rgba(224, 175, 104, 0.08);
  --scrollbar-thumb-hover: var(--text-muted);
  --radius: 8px;
  --radius-sm: 4px;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ─── Theme (Light) ─────────────────────────────────────────────────────── */
[data-theme="light"] {
  --brand: #008f24;
  --brand-dim: #006f1c;
  --brand-glow: rgba(0, 143, 36, 0.10);
  --bg: #f5f6f8;
  --bg-card: #ffffff;
  --bg-card-hover: #f0f1f4;
  --bg-surface: #ebedf0;
  --bg-input: #ffffff;
  --text: #1a1a2e;
  --text-dim: #4a4a68;
  --text-muted: #656578;
  --border: #d8dae0;
  --border-focus: rgba(0, 143, 36, 0.35);
  --yellow: #b8860b;
  --header-bg: rgba(245, 246, 248, 0.92);
  --modal-overlay: rgba(0, 0, 0, 0.45);
  --logo-center-fill: #f5f6f8;
  --verified: #2563eb;
  --verified-bg: rgba(37, 99, 235, 0.1);
  --tag-fixed: #2563eb;
  --tag-fixed-bg: rgba(37, 99, 235, 0.08);
  --badge-cat-bg: rgba(0, 143, 36, 0.06);
  --tag-added-bg: rgba(0, 143, 36, 0.08);
  --warn-bg: rgba(184, 134, 11, 0.1);
  --tag-changed-bg: rgba(184, 134, 11, 0.08);
  --scrollbar-thumb-hover: #aaa;
}

/* ─── Body ──────────────────────────────────────────────────────────────── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

a { color: var(--brand); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ─── Header ────────────────────────────────────────────────────────────── */
.site-header {
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-mark { width: 32px; height: 32px; }
.site-title {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
}
.site-title span { color: var(--brand); }
.header-left a { text-decoration: none; }
.header-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-left: 8px;
}
.nav-link {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s, background 0.15s;
}
.nav-link:hover { color: var(--brand); background: var(--brand-glow); text-decoration: none; }
.nav-link.active { color: var(--brand); background: var(--brand-glow); font-weight: 600; }
.nav-sep { color: var(--border); font-size: 14px; }
.header-version {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.gh-link {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-dim);
  padding: 6px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  transition: border-color 0.15s, color 0.15s;
}
.gh-link:hover { border-color: var(--brand); color: var(--brand); text-decoration: none; }
.gh-link svg { width: 16px; height: 16px; }
.gh-stars {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--brand);
  display: none;
}
.gh-stars.visible { display: inline; }
.gh-stars::before { content: "\2605 "; }

/* ─── Hero ──────────────────────────────────────────────────────────────── */
.hero {
  text-align: center;
  padding: 48px 24px 32px;
  max-width: 680px;
  margin: 0 auto;
}
.hero h1 {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}
.hero h1 .accent { color: var(--brand); }
.hero p {
  color: var(--text-dim);
  font-size: 15px;
  margin-bottom: 24px;
}
.stats-row {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 24px;
}
.stat {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
}
.stat strong {
  color: var(--brand);
  font-size: 20px;
  display: block;
}

/* ─── Search ────────────────────────────────────────────────────────────── */
.search-box {
  position: relative;
  max-width: 520px;
  margin: 0 auto 12px;
}
.search-box svg {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}
.search-input {
  width: 100%;
  padding: 12px 14px 12px 40px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.search-input::placeholder { color: var(--text-muted); }
.search-clear {
  position: absolute;
  right: 38px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 6px;
  line-height: 1;
  transition: color 0.15s;
}
.search-clear:hover { color: var(--text); }
.search-clear.hidden { display: none; }
.search-spinner {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
.search-spinner.hidden { display: none; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
.search-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px var(--brand-glow);
}

/* ─── Controls ──────────────────────────────────────────────────────────── */
.controls {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}
.category-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-bottom: 12px;
}
.cat-btn {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.cat-btn:hover { border-color: var(--text-muted); color: var(--text); }
.cat-btn.active {
  border-color: var(--brand);
  color: var(--brand);
  background: var(--brand-glow);
  font-weight: 700;
  box-shadow: 0 0 8px var(--brand-glow);
  border-width: 2px;
  padding: 4px 11px;
}
.cat-btn .count {
  font-size: 10px;
  opacity: 0.6;
  margin-left: 4px;
}
.category-tabs.collapsed .cat-btn.overflow { display: none; }
.cat-toggle {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 5px 12px;
  border: 1px dashed var(--text-muted);
  border-radius: 20px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.cat-toggle:hover { border-color: var(--brand); color: var(--brand); }

.filter-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.filter-select {
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text-dim);
  cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--brand); }
.result-count {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
}
.filter-check {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
}
.filter-check input[type="checkbox"] {
  accent-color: var(--verified);
  cursor: pointer;
}

/* ─── Grid ──────────────────────────────────────────────────────────────── */
.skill-grid {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
  gap: 12px;
}

/* ─── Card ──────────────────────────────────────────────────────────────── */
.skill-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.skill-card:hover {
  border-color: var(--brand-dim);
  box-shadow: 0 0 20px var(--brand-glow);
  transform: translateY(-1px);
}
.skill-card.official {
  border-left: 3px solid var(--brand);
}
.badge-official {
  color: var(--brand);
  background: var(--brand-glow);
  font-weight: 600;
}
.badge-verified {
  color: var(--verified);
  background: var(--verified-bg);
  font-weight: 600;
}
.skill-card.verified {
  border-left: 3px solid var(--verified);
}
.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
}
.skill-name {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--brand);
  word-break: break-word;
}
.skill-repo {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  flex-shrink: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 45%;
}
.skill-desc {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.45;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}
.card-footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 8px;
}
.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.badge {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  background: var(--bg-surface);
  color: var(--text-muted);
  white-space: nowrap;
}
.badge-cat { color: var(--brand-dim); background: var(--badge-cat-bg); }
.badge-warn {
  color: var(--yellow);
  background: var(--warn-bg);
  position: relative;
  cursor: help;
}
.badge-warn:focus::after, .badge-warn:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}
.badge-warn:focus { outline: none; }
.skill-version {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ─── Install Bar (on card) ─────────────────────────────────────────────── */
.install-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-surface);
  border-radius: var(--radius-sm);
  padding: 4px 8px;
  margin-top: 4px;
}
.install-cmd {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  user-select: all;
}
.copy-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  flex-shrink: 0;
}
.copy-btn:hover { border-color: var(--brand); color: var(--brand); }
.copy-btn.copied { border-color: var(--brand); color: var(--brand); }

/* ─── Modal ─────────────────────────────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--modal-overlay);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 600px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 24px;
}
.modal-close {
  float: right;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.modal-close:hover { color: var(--text); }
.modal-name {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 700;
  color: var(--brand);
  margin-bottom: 4px;
  padding-right: 32px;
}
.modal-repo {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.modal-desc {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
  margin-bottom: 20px;
}
.modal-meta {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px 16px;
  font-size: 13px;
  margin-bottom: 20px;
}
.meta-label {
  font-family: var(--font-mono);
  color: var(--text-muted);
  font-size: 12px;
}
.meta-value { color: var(--text-dim); }
.modal-install {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.modal-install code {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--brand);
  flex: 1;
  user-select: all;
  word-break: break-all;
}
.modal-install .copy-btn { font-size: 12px; padding: 5px 12px; }
.modal-skill-link {
  margin-top: 12px;
  text-align: center;
}
.modal-skill-link a {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--brand);
  padding: 8px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  display: inline-block;
  transition: all 0.15s;
}
.modal-skill-link a:hover {
  border-color: var(--brand);
  background: var(--brand-glow);
  text-decoration: none;
}

/* ─── Pagination ────────────────────────────────────────────────────────── */
.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 6px;
  padding: 24px;
}
.page-btn {
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.page-btn:hover { border-color: var(--text-muted); color: var(--text); }
.page-btn.active { border-color: var(--brand); color: var(--brand); background: var(--brand-glow); }
.page-btn:disabled { opacity: 0.3; cursor: default; }
.page-ellipsis {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-muted);
  padding: 0 4px;
}

/* ─── Footer ────────────────────────────────────────────────────────────── */
.site-footer {
  text-align: center;
  padding: 24px;
  font-size: 12px;
  color: var(--text-muted);
  border-top: 1px solid var(--border);
}

/* ─── Empty State ───────────────────────────────────────────────────────── */
.empty-state {
  text-align: center;
  padding: 60px 24px;
  grid-column: 1 / -1;
}
.empty-state p {
  color: var(--text-muted);
  font-size: 15px;
}
.empty-state .empty-icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: 0.3;
}

/* ─── Loading ───────────────────────────────────────────────────────────── */
.loading-state {
  text-align: center;
  padding: 60px 24px;
}
.loading-state p {
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: 14px;
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}
.loading-state p { animation: pulse 1.5s ease-in-out infinite; }

/* ─── Page Visibility ──────────────────────────────────────────────────── */
#page-catalog.hidden { display: none; }

/* ─── Page Content (Docs / Best Practices / Changelog) ────────────────── */
.page-content {
  display: none;
  max-width: 800px;
  margin: 0 auto;
  padding: 32px 24px 48px;
}
.page-content.active { display: block; }
.page-content h1 {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 700;
  color: var(--brand);
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.page-content h2 {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  margin-top: 32px;
  margin-bottom: 12px;
}
.page-content h3 {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
  color: var(--text-dim);
  margin-top: 24px;
  margin-bottom: 8px;
}
.page-content p {

  margin-bottom: 12px;
}

  margin-bottom: 12px;
  padding-left: 24px;
}
.page-content li { margin-bottom: 4px; }
.page-content code {

  background: var(--bg-surface);
  padding: 2px 6px;
  border-radius: 3px;
  color: var(--brand);
}
.page-content pre {
  background: var(--bg-surface);

  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 16px;
  overflow-x: auto;
  position: relative;
}
.pre-copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;

  font-size: 11px;
  padding: 3px 8px;

  transition: all 0.15s;
  opacity: 0;

.page-content pre code {
  background: none;
  padding: 0;
  font-size: 13px;
  color: var(--text);
}
.page-content table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 13px;
}
.page-content th {
  font-family: var(--font-mono);
  text-align: left;
  padding: 8px 12px;

  color: var(--text);

}

  color: var(--text-dim);
}

.page-content .doc-section {
  margin-bottom: 32px;
}
.page-content .back-link {

  font-size: 13px;
  color: var(--brand);
  margin-bottom: 16px;
}

/* Changelog-specific */
.changelog-version {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  color: var(--brand);

}
.changelog-date {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 12px;
}
.changelog-tag {

  font-size: 11px;
  padding: 2px 8px;
  border-radius: 3px;
  font-weight: 600;
  margin-bottom: 8px;
  display: inline-block;
}
.changelog-tag.added { color: var(--brand); background: var(--tag-added-bg); }
.changelog-tag.changed { color: var(--yellow); background: var(--tag-changed-bg); }

/* Acknowledgements-specific */
.contributor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.contributor-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;

  border: 1px solid var(--border);
  border-radius: var(--radius);

}

  border-color: var(--brand);
  background: var(--bg-card-hover);
}
.contributor-avatar {

}

.contributor-stats {

}
.dep-grid {

  margin-bottom: 24px;
}
.dep-card {

.theme-toggle {

<script>
// ─── Theme ─────────────────────────────────────────────────────────────────
(function initTheme() {
  var stored = localStorage.getItem('asm-theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)');
  var theme;
  if (stored === 'light' || stored === 'dark') {
    theme = stored;
  } else {
    theme = prefersDark.matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', theme);
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.setAttribute('aria-pressed', theme === 'light' ? 'true' : 'false');

  // Listen for OS preference changes (only when user has not set a manual preference)
  prefersDark.addEventListener('change', function(e) {
    if (!localStorage.getItem('asm-theme')) {
      var t = e.matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      var b = document.getElementById('theme-toggle');
      if (b) b.setAttribute('aria-pressed', t === 'light' ? 'true' : 'false');
    }
  });
})();

function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('asm-theme', next);
  var btn = document.getElementById('theme-toggle');
  if (btn) btn.setAttribute('aria-pressed', next === 'light' ? 'true' : 'false');
}

// ─── State ─────────────────────────────────────────────────────────────────
let catalog = null;
let searchQuery = '';
let activeCategory = 'all';
let activeRepo = 'all';
let verifiedOnly = false;
let currentPage = 1;
const PAGE_SIZE = 48;
let debounceTimer = null;

// ─── URL State ──────────────────────────────────────────────────────────────
function pushState() {
  const params = new URLSearchParams();
  if (searchQuery) params.set('q', searchQuery);
  if (activeCategory !== 'all') params.set('cat', activeCategory);
  if (activeRepo !== 'all') params.set('repo', activeRepo);
  if (verifiedOnly) params.set('verified', '1');
  if (currentPage > 1) params.set('page', currentPage);
  const qs = params.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}

function readState() {
  const params = new URLSearchParams(location.search);
  searchQuery = params.get('q') || '';
  activeCategory = params.get('cat') || 'all';
  activeRepo = params.get('repo') || 'all';
  verifiedOnly = params.get('verified') === '1';
  currentPage = parseInt(params.get('page'), 10) || 1;
}

// ─── XSS Helper ────────────────────────────────────────────────────────────
const escEl = document.createElement('span');
function esc(str) {
  escEl.textContent = str || '';
  return escEl.innerHTML.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ─── Search (mirrors src/skill-index.ts scoring) ───────────────────────────
const SCORE_NAME_EXACT = 10;
const SCORE_NAME_PARTIAL = 5;
const SCORE_DESC_EXACT = 3;
const SCORE_DESC_PARTIAL = 1;

function tokenize(text) {
  const tokens = new Set();
  const words = text.toLowerCase().split(/[\s\-_.,;:()[\]{}"']+/);
  for (const w of words) {
    if (w.length >= 2) tokens.add(w);
  }
  return tokens;
}

function scoreSkill(query, skill) {
  const qt = tokenize(query);
  const nt = tokenize(skill.name);
  const dt = tokenize(skill.description);
  let score = 0;
  for (const q of qt) {
    if (nt.has(q)) score += SCORE_NAME_EXACT;
    if (dt.has(q)) score += SCORE_DESC_EXACT;
    if (skill.name.toLowerCase().includes(q)) score += SCORE_NAME_PARTIAL;
    if (skill.description.toLowerCase().includes(q)) score += SCORE_DESC_PARTIAL;
  }
  return score;
}

// ─── Filter & Search ───────────────────────────────────────────────────────
function getFiltered() {
  if (!catalog) return [];
  let results = catalog.skills;

  // Category filter
  if (activeCategory !== 'all') {
    results = results.filter(s => s.categories.includes(activeCategory));
  }

  // Repo filter
  if (activeRepo !== 'all') {
    results = results.filter(s => s.owner + '/' + s.repo === activeRepo);
  }

  // Verified filter
  if (verifiedOnly) {
    results = results.filter(s => s.verified === true);
  }

  // Search
  if (searchQuery.trim()) {
    results = results
      .map(s => ({ skill: s, score: scoreSkill(searchQuery, s) }))
      .filter(r => r.score > 0)
      .sort((a, b) => b.score - a.score)
      .map(r => r.skill);
  }

  return results;
}

// ─── Render Grid ───────────────────────────────────────────────────────────
function renderCard(s) {
  const cmd = 'asm install ' + s.installUrl;
  const cats = s.categories.map(c => '<span class="badge badge-cat">' + esc(c) + '</span>').join('');
  const warn = s.allowedTools && s.allowedTools.length > 0
    ? '<span class="badge badge-warn" tabindex="0" title="Tool access: ' + esc(s.allowedTools.join(', ')) + '">&#x1F527; uses tools</span>'
    : '';
  const ver = s.version && s.version !== '0.0.0' ? '<span class="skill-version">v' + esc(s.version) + '</span>' : '';
  const isOfficial = s.owner === 'anthropics';
  const isVerified = s.verified === true;
  const officialBadge = isOfficial ? '<span class="badge badge-official">official</span>' : '';
  const verifiedBadge = isVerified ? '<span class="badge badge-verified">&#x2713; verified</span>' : '';
  let cardClass = 'skill-card';
  if (isOfficial) cardClass += ' official';
  if (isVerified) cardClass += ' verified';

  return '<article class="' + cardClass + '" data-id="' + esc(s.id) + '" tabindex="0" role="button">'
    + '<div class="card-header">'
    + '<span class="skill-name">' + esc(s.name) + '</span>'
    + '<span class="skill-repo">' + esc(s.owner) + '/' + esc(s.repo) + '</span>'
    + '</div>'
    + '<p class="skill-desc">' + esc(s.description) + '</p>'
    + '<div class="card-footer">'
    + '<div class="badge-row">' + officialBadge + verifiedBadge + cats + warn + '</div>'
    + ver
    + '</div>'
    + '<div class="install-bar">'
    + '<span class="install-cmd">' + esc(cmd) + '</span>'
    + '<button class="copy-btn" data-cmd="' + esc(cmd) + '" onclick="event.stopPropagation();copyCmd(this)">copy</button>'
    + '</div>'
    + '</article>';
}

function renderGrid() {
  const results = getFiltered();
  const total = results.length;
  const totalPages = Math.max(1, Math.ceil(total / PAGE_SIZE));

  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = results.slice(start, start + PAGE_SIZE);

  const grid = document.getElementById('skill-grid');
  if (page.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x2728;</div><p>No skills match your search</p></div>';
  } else {
    grid.innerHTML = page.map(renderCard).join('');
  }

  // Result count
  const countEl = document.getElementById('result-count');
  if (searchQuery || activeCategory !== 'all' || activeRepo !== 'all' || verifiedOnly) {
    countEl.textContent = 'Showing ' + total + ' of ' + catalog.totalSkills + ' skills';
  } else {
    countEl.textContent = total + ' skills';
  }

  renderPagination(total, totalPages);
}

// ─── Pagination ────────────────────────────────────────────────────────────
function renderPagination(total, totalPages) {
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = '';
  html += '<button class="page-btn" ' + (currentPage <= 1 ? 'disabled' : '') + ' data-page="' + (currentPage - 1) + '">&laquo;</button>';

  const pages = getPaginationRange(currentPage, totalPages);
  for (const p of pages) {
    if (p === '...') {
      html += '<span class="page-ellipsis">...</span>';
    } else {
      html += '<button class="page-btn' + (p === currentPage ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
    }
  }

  html += '<button class="page-btn" ' + (currentPage >= totalPages ? 'disabled' : '') + ' data-page="' + (currentPage + 1) + '">&raquo;</button>';
  el.innerHTML = html;
}

function getPaginationRange(current, total) {
  if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
  const pages = [];
  if (current <= 4) {
    for (let i = 1; i <= 5; i++) pages.push(i);
    pages.push('...', total);
  } else if (current >= total - 3) {
    pages.push(1, '...');
    for (let i = total - 4; i <= total; i++) pages.push(i);
  } else {
    pages.push(1, '...', current - 1, current, current + 1, '...', total);
  }
  return pages;
}

// ─── Modal ─────────────────────────────────────────────────────────────────
function openModal(skillId) {
  const skill = catalog.skills.find(s => s.id === skillId);
  if (!skill) return;

  const cmd = 'asm install ' + skill.installUrl;
  const cats = skill.categories.map(c => '<span class="badge badge-cat">' + esc(c) + '</span>').join(' ');

  let meta = '';
  meta += '<span class="meta-label">Status</span><span class="meta-value">' + (skill.verified ? '<span class="badge badge-verified">&#x2713; verified</span>' : '<span class="badge">unverified</span>') + '</span>';
  if (skill.version && skill.version !== '0.0.0') meta += '<span class="meta-label">Version</span><span class="meta-value">' + esc(skill.version) + '</span>';
  if (skill.license) meta += '<span class="meta-label">License</span><span class="meta-value">' + esc(skill.license) + '</span>';
  if (skill.creator) meta += '<span class="meta-label">Creator</span><span class="meta-value">' + esc(skill.creator) + '</span>';
  if (skill.compatibility) meta += '<span class="meta-label">Compat</span><span class="meta-value">' + esc(skill.compatibility) + '</span>';
  if (skill.allowedTools && skill.allowedTools.length > 0) meta += '<span class="meta-label">Tools</span><span class="meta-value badge-warn">' + esc(skill.allowedTools.join(', ')) + '</span>';
  meta += '<span class="meta-label">Repo</span><span class="meta-value"><a href="https://github.com/' + esc(skill.owner) + '/' + esc(skill.repo) + '" target="_blank" rel="noopener">' + esc(skill.owner) + '/' + esc(skill.repo) + '</a></span>';
  meta += '<span class="meta-label">Categories</span><span class="meta-value">' + cats + '</span>';

  document.getElementById('modal-content').innerHTML =
    '<div class="modal-name" id="modal-title">' + esc(skill.name) + '</div>'
    + '<div class="modal-repo">' + esc(skill.owner) + '/' + esc(skill.repo) + '</div>'
    + '<div class="modal-desc">' + esc(skill.description) + '</div>'
    + (meta ? '<div class="modal-meta">' + meta + '</div>' : '')
    + '<div class="modal-install">'
    + '<code>' + esc(cmd) + '</code>'
    + '<button class="copy-btn" data-cmd="' + esc(cmd) + '" onclick="copyCmd(this)">copy</button>'
    + '</div>'
    + (skill.skillUrl ? '<div class="modal-skill-link"><a href="' + esc(skill.skillUrl) + '" target="_blank" rel="noopener">View SKILL.md on GitHub &rarr;</a></div>' : '');

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('modal-close').focus();
  trapFocus(document.getElementById('modal'));
}

let lastFocusedCard = null;
let _focusTrapHandler = null;

function trapFocus(el) {
  _focusTrapHandler = function(e) {
    if (e.key !== 'Tab') return;
    const focusable = el.querySelectorAll('button, a[href], input, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    const first = focusable[0];
    const last = focusable[focusable.length - 1];
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last) { e.preventDefault(); first.focus(); }
    }
  };
  document.addEventListener('keydown', _focusTrapHandler);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  if (_focusTrapHandler) {
    document.removeEventListener('keydown', _focusTrapHandler);
    _focusTrapHandler = null;
  }
  if (lastFocusedCard) {
    lastFocusedCard.focus();
    lastFocusedCard = null;
  }
}

// ─── Copy ──────────────────────────────────────────────────────────────────
function copyCmd(btn) {
  const cmd = btn.getAttribute('data-cmd');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(cmd).then(() => showCopied(btn));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = cmd;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showCopied(btn);
  }
}

function showCopied(btn) {
  btn.textContent = 'copied!';
  btn.classList.add('copied');
  setTimeout(() => {
    btn.textContent = 'copy';
    btn.classList.remove('copied');
  }, 1500);
}

// ─── Init Categories ───────────────────────────────────────────────────────
function initControls() {
  // Category tabs
  const tabsEl = document.getElementById('category-tabs');
  // Count skills per category
  const catCounts = {};
  for (const s of catalog.skills) {
    for (const c of s.categories) {
      catCounts[c] = (catCounts[c] || 0) + 1;
    }
  }

  const MAX_VISIBLE_CATS = 6;
  let tabsHtml = '<button class="cat-btn' + (activeCategory === 'all' ? ' active' : '') + '" data-cat="all">All <span class="count">' + catalog.totalSkills + '</span></button>';
  catalog.categories.forEach(function(cat, i) {
    const overflow = i >= MAX_VISIBLE_CATS ? ' overflow' : '';
    tabsHtml += '<button class="cat-btn' + overflow + (activeCategory === cat ? ' active' : '') + '" data-cat="' + esc(cat) + '">' + esc(cat) + ' <span class="count">' + (catCounts[cat] || 0) + '</span></button>';
  });
  if (catalog.categories.length > MAX_VISIBLE_CATS) {
    tabsHtml += '<button class="cat-toggle" id="cat-toggle">+' + (catalog.categories.length - MAX_VISIBLE_CATS) + ' more</button>';
  }
  tabsEl.innerHTML = tabsHtml;
  // Start collapsed unless the active category is in the overflow
  var activeIdx = catalog.categories.indexOf(activeCategory);
  if (activeIdx < MAX_VISIBLE_CATS) {
    tabsEl.classList.add('collapsed');
  }

  // Repo filter
  const repoEl = document.getElementById('repo-filter');
  let repoHtml = '<option value="all">All Repos (' + catalog.totalRepos + ')</option>';
  for (const r of catalog.repos) {
    repoHtml += '<option value="' + esc(r.owner + '/' + r.repo) + '">' + esc(r.owner + '/' + r.repo) + ' (' + r.skillCount + ')</option>';
  }
  repoEl.innerHTML = repoHtml;
  repoEl.value = activeRepo;

  // Stats
  document.getElementById('total-skills').textContent = catalog.totalSkills.toLocaleString();
  document.getElementById('total-repos').textContent = catalog.totalRepos;
  document.getElementById('total-categories').textContent = catalog.categories.length;
  document.getElementById('generated-at').textContent = new Date(catalog.generatedAt).toLocaleDateString();

  // Stars
  if (catalog.stars > 0) {
    var starsEl = document.getElementById('gh-stars');
    starsEl.textContent = catalog.stars.toLocaleString();
    starsEl.classList.add('visible');
  }

  // Enable search
  const searchEl = document.getElementById('search-input');
  searchEl.disabled = false;
  searchEl.placeholder = 'Search ' + catalog.totalSkills.toLocaleString() + ' skills...';
  document.getElementById('search-spinner').classList.add('hidden');
}

// ─── Event Listeners ───────────────────────────────────────────────────────
function attachEvents() {
  // Search with debounce
  var searchInput = document.getElementById('search-input');
  var clearBtn = document.getElementById('search-clear');
  searchInput.addEventListener('input', function(e) {
    var value = e.target.value;
    clearBtn.classList.toggle('hidden', !value);
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      searchQuery = value;
      currentPage = 1;
      renderGrid();
      pushState();
    }, 200);
  });
  clearBtn.addEventListener('click', function() {
    searchInput.value = '';
    searchInput.focus();
    clearBtn.classList.add('hidden');
    searchQuery = '';
    currentPage = 1;
    renderGrid();
    pushState();
  });

  // Category tabs (event delegation)
  document.getElementById('category-tabs').addEventListener('click', function(e) {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    activeCategory = btn.getAttribute('data-cat');
    currentPage = 1;
    // Update active class
    this.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderGrid();
    pushState();
  });

  // Category toggle
  var toggleBtn = document.getElementById('cat-toggle');
  if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
      var tabs = document.getElementById('category-tabs');
      tabs.classList.toggle('collapsed');
      this.textContent = tabs.classList.contains('collapsed') ? '+' + (catalog.categories.length - 6) + ' more' : 'Show less';
    });
  }

  // Repo filter
  document.getElementById('repo-filter').addEventListener('change', function(e) {
    activeRepo = e.target.value;
    currentPage = 1;
    renderGrid();
    pushState();
  });

  // Verified filter
  var verifiedEl = document.getElementById('verified-filter');
  verifiedEl.checked = verifiedOnly;
  verifiedEl.addEventListener('change', function(e) {
    verifiedOnly = e.target.checked;
    currentPage = 1;
    renderGrid();
    pushState();
  });

  // Grid card clicks (event delegation)
  var gridEl = document.getElementById('skill-grid');
  gridEl.addEventListener('click', function(e) {
    const card = e.target.closest('.skill-card');
    if (!card) return;
    if (e.target.closest('.copy-btn')) return;
    lastFocusedCard = card;
    openModal(card.getAttribute('data-id'));
  });
  gridEl.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter' && e.key !== ' ') return;
    const card = e.target.closest('.skill-card');
    if (!card) return;
    e.preventDefault();
    lastFocusedCard = card;
    openModal(card.getAttribute('data-id'));
  });

  // Pagination (event delegation)
  document.getElementById('pagination').addEventListener('click', function(e) {
    const btn = e.target.closest('.page-btn');
    if (!btn || btn.disabled) return;
    currentPage = parseInt(btn.getAttribute('data-page'), 10);
    renderGrid();
    pushState();
    document.getElementById('skill-grid').scrollIntoView({ behavior: 'smooth' });
  });

  // Modal close
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Theme toggle
  document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
    // Focus search on /
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
      e.preventDefault();
      document.getElementById('search-input').focus();
    }
  });
}

// ─── Page Navigation ────────────────────────────────────────────────────────
let currentPageView = 'catalog';

function navigateTo(page) {
  currentPageView = page;
  // Update nav active state
  document.querySelectorAll('.nav-link').forEach(function(link) {
    link.classList.toggle('active', link.getAttribute('data-page') === page);
  });
  // Show/hide pages
  document.getElementById('page-catalog').classList.toggle('hidden', page !== 'catalog');
  var docsEl = document.getElementById('page-docs');
  var bestPracticesEl = document.getElementById('page-best-practices');
  var changelogEl = document.getElementById('page-changelog');
  var acknowledgementsEl = document.getElementById('page-acknowledgements');
  docsEl.classList.toggle('active', page === 'docs');
  bestPracticesEl.classList.toggle('active', page === 'best-practices');
  changelogEl.classList.toggle('active', page === 'changelog');
  acknowledgementsEl.classList.toggle('active', page === 'acknowledgements');
  // Update hash
  if (page === 'catalog') {
    if (location.hash === '#docs' || location.hash === '#best-practices' || location.hash === '#changelog' || location.hash === '#acknowledgements') history.replaceState(null, '', location.pathname + location.search);
  } else {
    history.replaceState(null, '', '#' + page);
  }
  // Render page content on first visit
  if (page === 'docs' && !docsEl.innerHTML) { renderDocsPage(); addPreCopyButtons(docsEl); }
  if (page === 'best-practices' && !bestPracticesEl.innerHTML) { renderBestPracticesPage(); addPreCopyButtons(bestPracticesEl); }
  if (page === 'changelog' && !changelogEl.innerHTML) { renderChangelogPage(); addPreCopyButtons(changelogEl); }
  if (page === 'acknowledgements' && !acknowledgementsEl.innerHTML) { renderAcknowledgementsPage(); }
  window.scrollTo(0, 0);
}

function handleHashChange() {
  var hash = location.hash.replace('#', '');
  if (hash === 'docs' || hash === 'best-practices' || hash === 'changelog' || hash === 'acknowledgements') {
    navigateTo(hash);
  } else {
    navigateTo('catalog');
  }
}

window.addEventListener('hashchange', handleHashChange);

// ─── Copy Buttons for Code Blocks ───────────────────────────────────────────
function addPreCopyButtons(container) {
  var pres = container.querySelectorAll('pre');
  for (var i = 0; i < pres.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'pre-copy-btn';
    btn.textContent = 'copy';
    btn.addEventListener('click', (function(pre) {
      return function(e) {
        e.stopPropagation();
        var text = pre.querySelector('code').textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function() { showCopied(e.target); });
        } else {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          showCopied(e.target);
        }
      };
    })(pres[i]));
    pres[i].appendChild(btn);
  }
}

var VALID_TAGS = { added: true, changed: true, fixed: true };

function renderChangelogEntry(version, date, sections) {
  var html = '<div class="changelog-version">v' + esc(version) + '</div>'
    + '<div class="changelog-date">' + esc(date) + '</div>';
  for (var i = 0; i < sections.length; i++) {
    var s = sections[i];
    // Only allow known tag values for CSS class safety
    var tagClass = VALID_TAGS[s.tag] ? s.tag : 'added';
    html += '<span class="changelog-tag ' + tagClass + '">' + esc(s.tag.charAt(0).toUpperCase() + s.tag.slice(1)) + '</span>';
    html += '<ul>';
    for (var j = 0; j < s.items.length; j++) {
      // Items are trusted HTML from hardcoded changelog content only.
      // Never pass external/user-supplied data as items.
      html += '<li>' + s.items[j] + '</li>';
    }
    html += '</ul>';
  }
  return html;
}

// ─── Acknowledgements Page Content ──────────────────────────────────────────
// The single source of truth for acknowledgements data is website/data/acknowledgements.json.
// This function fetches data from that JSON file at runtime — no hardcoded copies here.
async function renderAcknowledgementsPage() {
  var target = document.getElementById('page-acknowledgements');
  // Set loading state immediately so the !innerHTML guard in navigateTo() prevents duplicate fetches.
  target.innerHTML = '<h1>Acknowledgements</h1><p>Loading&hellip;</p>';

  try {
    var res = await fetch('data/acknowledgements.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var data = await res.json();
  } catch (err) {
    target.innerHTML = '<h1>Acknowledgements</h1>'
      + '<div class="empty-state"><div class="empty-icon">&#x26a0;</div>'
      + '<p>Could not load acknowledgements data: ' + esc(err.message) + '</p></div>';
    return;
  }

  var contributors = data.contributors || [];
  var deps = data.dependencies || [];

  var html = '<h1>Acknowledgements</h1>'
    + '<p>ASM is built with the help of amazing contributors and open-source libraries. This page gives credit where credit is due.</p>';

  // Contributors section
  html += '<h2>Contributors</h2>'
    + '<p>Thank you to everyone who has contributed to agent-skill-manager.</p>'
    + '<div class="contributor-grid">';

  for (var i = 0; i < contributors.length; i++) {
    var c = contributors[i];
    var prLinks = '';
    for (var j = 0; j < c.prs.length; j++) {
      if (j > 0) prLinks += ' ';
      prLinks += '<a href="https://github.com/luongnv89/agent-skill-manager/pull/' + esc(String(c.prs[j])) + '" target="_blank" rel="noopener">#' + esc(String(c.prs[j])) + '</a>';
    }
    html += '<div class="contributor-card">'
      + '<img class="contributor-avatar" src="' + esc(c.avatar) + '" alt="' + esc(c.login) + '" loading="lazy" />'
      + '<div class="contributor-info">'
      + '<a class="contributor-handle" href="https://github.com/' + esc(c.login) + '" target="_blank" rel="noopener">@' + esc(c.login) + '</a>'
      + '<div class="contributor-stats">' + esc(String(c.prs.length)) + ' merged PR' + (c.prs.length !== 1 ? 's' : '') + '</div>'
      + '<div class="contributor-prs">' + prLinks + '</div>'
      + '</div>'
      + '</div>';
  }

  html += '</div>';

  // Dependencies section
  html += '<h2>Dependencies</h2>'
    + '<p>The open-source libraries that ASM depends on in production.</p>'
    + '<div class="dep-grid">';

  for (var k = 0; k < deps.length; k++) {
    var d = deps[k];
    html += '<div class="dep-card">'
      + '<a class="dep-name" href="' + esc(d.url) + '" target="_blank" rel="noopener">' + esc(d.name) + '</a>'
      + '<span class="dep-version">' + esc(d.version) + '</span>'
      + '<div class="dep-desc">' + esc(d.desc) + '</div>'
      + '</div>';
  }

  html += '</div>';

  target.innerHTML = html;
}

// ─── Boot ──────────────────────────────────────────────────────────────────
async function boot() {
  try {
    const res = await fetch('catalog.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    catalog = await res.json();
    readState();
    initControls();
    attachEvents();
    renderGrid();
    // Restore search input from URL state
    document.getElementById('search-input').value = searchQuery;
    if (searchQuery) document.getElementById('search-clear').classList.remove('hidden');
    // Set version from catalog
    if (catalog.version) {
      document.getElementById('header-version').textContent = 'v' + catalog.version;
    }
    // Handle initial hash navigation
    handleHashChange();
  } catch (err) {
    document.getElementById('skill-grid').innerHTML =
      '<div class="empty-state"><div class="empty-icon">&#x26a0;</div><p>Failed to load catalog: ' + esc(err.message) + '</p></div>';
  }
}

boot();
