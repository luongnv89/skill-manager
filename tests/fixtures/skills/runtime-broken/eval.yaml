# Deterministic eval spec for `runtime-broken`.
#
# Designed to fail when run by the built-in deterministic provider:
# the regex grader requires the SKILL.md body to start with a
# specific line shape that the fixture intentionally does not match.
name: runtime-broken
threshold: 0.8

graders:
  - id: must-have-banner
    kind: contains
    needle: "BANNER:THIS-WILL-NOT-EXIST"
